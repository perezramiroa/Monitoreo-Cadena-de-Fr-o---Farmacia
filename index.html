<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoreo de Sistemas de Cadena de Frío - Farmacia</title>
  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="./icons/icon-192x192.png">

  <!-- Theme Color para navegadores -->
  <meta name="theme-color" content="#00384d">

  <!-- Iconos para iOS -->
  <link rel="apple-touch-icon" href="./icons/icon-192x192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vicus Farmacia">

  <!-- Viewport optimizado para móvil -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Estilos PWA -->
  <link rel="stylesheet" href="./css/pwa-styles.css">
  <style>
    :root {
      --bg: #ffffff;
      --primary: #00384d;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: var(--bg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* Contenedor del Portal */
    .portal-container {
      position: relative;
      max-width: 900px;
      width: 95%;
      margin: 20px auto;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      border-radius: 20px;
      overflow: hidden;
      background: white;
    }

    .portal-image {
      width: 100%;
      height: auto;
      display: block;
    }

    .footer {
      width: 100%;
      background: #f8fafc;
      color: #64748b;
      text-align: center;
      padding: 15px;
      font-size: 0.85rem;
      border-top: 1px solid #e2e8f0;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .portal-container {
      animation: fadeIn 0.8s ease-out;
    }

    /* Modal de Contraseña */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      width: 90%;
      max-width: 320px;
      text-align: center;
    }

    .modal-content h3 {
      margin-bottom: 16px;
      color: var(--primary);
    }

    .modal-content input {
      width: 100%;
      padding: 10px;
      margin-bottom: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 1rem;
      text-align: center;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-confirm {
      background: var(--primary);
      color: white;
    }

    .btn-cancel {
      background: #e2e8f0;
      color: #64748b;
    }
  </style>
  <!-- Service Worker y Utilidades PWA -->
  <script src="./js/pwa-utils.js"></script>
</head>

<body>

  <div class="portal-container">
    <!-- Imagen principal con Mapa de Imagen -->
    <img src="./logos/portal-vicus.png" usemap="#mapaPortal" alt="Portal Vicus" class="portal-image" id="portalImg">

    <map name="mapaPortal" id="mapaPortal">
      <!-- Zona de Farmacia: Coordenadas calculadas para base 1024x1024 -->
      <area shape="rect" coords="940,591,1152,902" alt="Farmacia" onclick="accederModulo('Farmacia')"
        style="cursor:pointer;">
    </map>
  </div>

  <!-- Modal de Contraseña -->
  <div id="passModal" class="modal-overlay">
    <div class="modal-content">
      <h3 id="modalTitle">🔒 Acceso</h3>
      <input type="password" id="passInput" placeholder="Ingrese contraseña" />
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-confirm" onclick="confirmPass()">Entrar</button>
      </div>
    </div>
  </div>



  <script>
    // 🔐 Configuración de seguridad
    const CONFIG = {
      farmacia: {
        pass: "Farmacia6",
        url: "Vicus_farmacia.html"
      }
    };

    let currentModulo = '';

    function accederModulo(modulo) {
      const mod = modulo.toLowerCase();
      const settings = CONFIG[mod];

      if (!settings) {
        alert("Módulo en desarrollo.");
        return;
      }

      currentModulo = mod;
      document.getElementById('modalTitle').innerText = `🔒 Módulo ${modulo}`;
      document.getElementById('passInput').value = '';
      document.getElementById('passModal').style.display = 'flex';
      document.getElementById('passInput').focus();
    }

    function closeModal() {
      document.getElementById('passModal').style.display = 'none';
    }

    function confirmPass() {
      const passIngresada = document.getElementById('passInput').value;
      const settings = CONFIG[currentModulo];

      if (passIngresada === settings.pass) {
        window.location.href = settings.url;
      } else {
        alert("❌ Contraseña incorrecta. Acceso denegado.");
        document.getElementById('passInput').value = '';
        document.getElementById('passInput').focus();
      }
    }

    // Permitir Enter en el input
    document.getElementById('passInput').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') confirmPass();
    });

    // 📏 Lógica de redimensionamiento del mapa (Mismo sistema que Inmunizaciones)
    function resizeMap() {
      const img = document.getElementById('portalImg');
      if (!img) return;
      const map = document.getElementById('mapaPortal');
      if (!map) return;

      // Base original de diseño: 1254x1254 (actualizado para la nueva imagen)
      const scaleX = img.offsetWidth / 1254;
      const scaleY = img.offsetHeight / 1254;

      const areas = map.getElementsByTagName('area');
      for (let i = 0; i < areas.length; i++) {
        let originalCoords = areas[i].getAttribute('data-original-coords');
        if (!originalCoords) {
          originalCoords = areas[i].getAttribute('coords');
          areas[i].setAttribute('data-original-coords', originalCoords);
        }

        const coords = originalCoords.split(',').map(Number);
        const newCoords = [];
        for (let j = 0; j < coords.length; j += 2) {
          newCoords.push(Math.round(coords[j] * scaleX));
          newCoords.push(Math.round(coords[j + 1] * scaleY));
        }
        areas[i].setAttribute('coords', newCoords.join(','));
      }
    }

    window.addEventListener('resize', resizeMap);
    window.onload = function () {
      // Inicializar coordenadas originales al cargar
      const areas = document.getElementById('mapaPortal').getElementsByTagName('area');
      for (let i = 0; i < areas.length; i++) {
        areas[i].setAttribute('data-original-coords', areas[i].getAttribute('coords'));
      }
      resizeMap();
    };
  </script>
</body>

</html>
