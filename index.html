<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoreo de Sistemas de Cadena de Frío - Farmacia</title>
  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="./icons/icon-192x192.png">

  <!-- Theme Color para navegadores -->
  <meta name="theme-color" content="#00384d">

  <!-- Iconos para iOS -->
  <link rel="apple-touch-icon" href="./icons/icon-192x192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vicus Farmacia">

  <!-- Viewport optimizado para móvil -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Estilos PWA -->
  <link rel="stylesheet" href="./css/pwa-styles.css">
  <style>
    :root {
      --bg: #ffffff;
      --primary: #00384d;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: var(--bg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* Contenedor del Portal */
    .portal-container {
      position: relative;
      max-width: 900px;
      width: 95%;
      margin: 20px auto;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      border-radius: 20px;
      overflow: hidden;
      background: white;
    }

    .portal-image {
      width: 100%;
      height: auto;
      display: block;
    }

    .footer {
      width: 100%;
      background: #f8fafc;
      color: #64748b;
      text-align: center;
      padding: 15px;
      font-size: 0.85rem;
      border-top: 1px solid #e2e8f0;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .portal-container {
      animation: fadeIn 0.8s ease-out;
    }
  </style>
  <!-- Service Worker y Utilidades PWA -->
  <script src="./js/pwa-utils.js"></script>
</head>

<body>

  <div class="portal-container">
    <!-- Imagen principal con Mapa de Imagen -->
    <img src="./logos/portal-vicus.png" usemap="#mapaPortal" alt="Portal Vicus" class="portal-image" id="portalImg">

    <map name="mapaPortal" id="mapaPortal">
      <!-- Zona de Farmacia: Coordenadas calculadas para base 1024x1024 -->
      <area shape="rect" coords="745,510,965,750" alt="Farmacia" onclick="accederModulo('Farmacia')"
        style="cursor:pointer;">
    </map>
  </div>



  <script>
    // 🔐 Configuración de seguridad
    const CONFIG = {
      farmacia: {
        pass: "Farmacia6",
        url: "Vicus_farmacia.html"
      }
    };

    function accederModulo(modulo) {
      const mod = modulo.toLowerCase();
      const settings = CONFIG[mod];

      if (!settings) {
        alert("Módulo en desarrollo.");
        return;
      }

      let passIngresada = prompt(`🔒 Módulo ${modulo}\nIngrese la contraseña de acceso:`);

      if (passIngresada === null) return;

      if (passIngresada === settings.pass) {
        window.location.href = settings.url;
      } else {
        alert("❌ Contraseña incorrecta. Acceso denegado.");
      }
    }

    // 📏 Lógica de redimensionamiento del mapa (Mismo sistema que Inmunizaciones)
    function resizeMap() {
      const img = document.getElementById('portalImg');
      if (!img) return;
      const map = document.getElementById('mapaPortal');
      if (!map) return;

      // Base original de diseño: 1254x1254 (actualizado para la nueva imagen)
      const scaleX = img.offsetWidth / 1254;
      const scaleY = img.offsetHeight / 1254;

      const areas = map.getElementsByTagName('area');
      for (let i = 0; i < areas.length; i++) {
        let originalCoords = areas[i].getAttribute('data-original-coords');
        if (!originalCoords) {
          originalCoords = areas[i].getAttribute('coords');
          areas[i].setAttribute('data-original-coords', originalCoords);
        }

        const coords = originalCoords.split(',').map(Number);
        const newCoords = [];
        for (let j = 0; j < coords.length; j += 2) {
          newCoords.push(Math.round(coords[j] * scaleX));
          newCoords.push(Math.round(coords[j + 1] * scaleY));
        }
        areas[i].setAttribute('coords', newCoords.join(','));
      }
    }

    window.addEventListener('resize', resizeMap);
    window.onload = function () {
      // Inicializar coordenadas originales al cargar
      const areas = document.getElementById('mapaPortal').getElementsByTagName('area');
      for (let i = 0; i < areas.length; i++) {
        areas[i].setAttribute('data-original-coords', areas[i].getAttribute('coords'));
      }
      resizeMap();

      // 🛠 Herramienta de Diagnóstico: Obtener coordenadas al hacer clic
      document.getElementById('portalImg').addEventListener('click', function (e) {
        const rect = this.getBoundingClientRect();
        const x = Math.round((e.clientX - rect.left) * (1254 / this.offsetWidth));
        const y = Math.round((e.clientY - rect.top) * (1254 / this.offsetHeight));
        alert(`Coordenadas para el código:\nX: ${x}, Y: ${y}\n\nHaz clic en las dos esquinas del botón y pásame los datos.`);
      });
    };
  </script>
</body>

</html>
